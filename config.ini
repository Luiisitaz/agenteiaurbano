[openai]
# Base URL for OpenAI-compatible APIs
base_url = https://api.openai.com/v1
# Default chat model (override as needed)
chat_model = gpt-5.4
# Lower-cost alternative
chat_model_fallback = gpt-5-mini
# Embeddings model + dimensions
embedding_model = text-embedding-3-small
embedding_dimensions = 1536

[app]
# Similarity threshold for duplicate detection (0-1)
duplicate_threshold = 0.85
# Default radius for nearby searches (meters)
nearby_radius_m = 500
# Fixed radius for incident clustering (meters)
cluster_radius_m = 100
# Max results to return in lists
max_results = 20

[geocoding]
# Provider: nominatim | google_places
provider = google_places
# User-Agent required by Nominatim
user_agent = urban-agent
# Google Places settings (used when provider = google_places)
google_region = pa
google_language = es
